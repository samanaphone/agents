<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    main { max-width: 540px; margin: 48px auto; padding: 0 24px; }

  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">🔐 Samana Help Desk Phone System</div>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      {{range .User.Roles}}
        {{if eq . "admin"}}
          <a href="/queuestatus" class="nav-link">Queue Status</a>
          <a href="/users" class="nav-link">Users</a>
        {{end}}
      {{end}}
      <a href="/logout" class="nav-link logout">Sign out</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <img src="{{.User.Picture}}" alt="{{.User.Name}}" class="avatar" referrerpolicy="no-referrer"/>
      <h2>{{.User.Name}}</h2>
      <p class="email">{{.User.Email}}</p>

      <div class="info-row">
        <span class="info-label">User ID</span>
        <span class="info-value">{{.User.ID}}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value">{{.User.Email}}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Auth Provider</span>
        <span class="provider-badge">Google</span>
      </div>
    </div>
  </main>
</body>
</html>
